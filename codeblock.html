<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="image_pdf/ss.jpg">
<meta charset="UTF-8">
<!-- Адаптивность  -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>НАШ сайт</title>
<link rel="stylesheet" href="css/general.css">
<link rel="stylesheet" href="css/codeblock/codeblock.css">
<link rel="stylesheet" href="css/codeblock/blocks.css">
</head>
<body>
  <div class="card">
    <!-- Кнопки -->
    <a href="codeblock.html" class="contact-buttonn">Главное</a>
    <a href="about_me.html" class="contact-button">О нас</a>
    <a href="gaide.pdf" class="contact-button">Как пользоваться ЭТИМ (Никак)</a>
  </div>

  <input type="checkbox" id="side-checkbox" />

  <div class="side-panel">
    <label class="side-button-2" for="side-checkbox">+</label>
    <div class="block" block_type="event">
      <div class="top_block">
        <p>Event</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button onclick="START(this.closest('.movable').id)">Start</button>
          <script>
            function START(th){
              clear_console();
              clear_ERR();
              couts = document.querySelectorAll("[block_type='cout']")
              functions["event"]?.(th);
            }
          </script>
        </div>
        <div class="column">
          Start
        </div>
        <div class="column">
          <button class="out" _type="Exec">▷</button>
        </div>
      </div>
    </div>

    <div class="block" block_type="variable">
      <div class="top_block">
        <p>Variable</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column"></div>
        <div class="column">
          <select>
            <option>Integer</option>
            <option>Float</option>
            <option>String</option>
            <option selected>Boolean</option>
          </select>
          <select>
            <option>
              ■ Single
            </option>
            <option>
              ■ ■ ■ Array
            </option>
            <option>
              {} Struct
            </option>
          </select>
          <input name="Var" placeholder="input name">
        </div>
        <div class="column"></div>
      </div>
    </div>

    <div class="block" block_type="set">
      <div class="top_block">
        <p>Set</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Exec">▷</button>
          <button class="in" _type=""></button>
        </div>
        <div class="column">
          <input placeholder="variable name" list="choose_or_input">
          <datalist id="choose_or_input">
          </datalist>
        </div>
        <div class="column">
          <button class="out" _type="Exec">▷</button>
        </div>
      </div>
    </div>

    <div class="block" block_type="get" >
      <div class="top_block">
        <p>Get</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
        </div>
        <div class="column">
          <input list="choose_or_input" placeholder="variable name">
          <datalist id="choose_or_input">
          </datalist>
          <script>
            function update_datalist() {
              const datalist = document.getElementById('choose_or_input');
              if (!datalist) return;

              datalist.innerHTML = '';
  
              variables.forEach(variable => {
                if (variable.name) {
                  const option = document.createElement('option');
                  option.value = variable.name;
                  datalist.appendChild(option);
                }
              });
            }
          </script>
        </div>
        <div class="column">
          <button class="out" _type=""></button>
        </div>
      </div>
    </div>

    <div class="block" block_type="multiplication" >
      <div class="top_block">
        <p>Multiplication</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
          <button class="add">+</button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Integer"></button>
        </div>
      </div>
    </div>

    <div class="block" block_type="sum" >
      <div class="top_block">
        <p>Sum</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
          <button class="add">+</button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Integer"></button>
        </div>
      </div>
    </div>

    <div class="block" block_type="branch" >
      <div class="top_block">
        <p>Branch (if)</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Exec">▷</button>
          <button class="in" _type="Boolean"></button>
        </div>
        <div class="column"></div>
        <div class="column">
          <button class="out" _type="Exec">▷</button>
          True
          <button class="out" _type="Exec">▷</button>
          False
        </div>
      </div>
    </div>

    <div class="block" block_type="cout">
      <div class="top_block">
        <p>Cout</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Exec">▷</button>
          <button class="in" _type=""></button>
        </div>
        <div class="column"></div>
        <div class="column"></div>
      </div>
    </div>

    <div class="block" block_type="const">
      <div class="top_block">
        <p>Const</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
        </div>
        <div class="column">
          <select class="const-type-select">
            <option value="Integer" selected>Integer</option>
            <option value="Float">Float</option>
            <option value="String">String</option>
            <option value="Boolean">Boolean</option>
          </select>
          <div class="const-input-container">
            <input type="text" style="width: 60px;" placeholder="value">
          </div>
        </div>
        <div class="column">
          <button class="out" _type="Integer"></button>
        </div>
      </div>
    </div>
    
    <div class="block" block_type="subtraction" >
      <div class="top_block">
        <p>Subtraction</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
          <button class="add">+</button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Integer"></button>
        </div>
      </div>
    </div>
    
    <div class="block" block_type="division" >
      <div class="top_block">
        <p>Division</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
          <button class="add">+</button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Integer"></button>
        </div>
      </div>
    </div>

    <div class='block' block_type="modulo">
        <div class="top_block">
          <p>Modulo</p>
          <button class="delete-button_x">x</button>
        </div>
        <div class="three_columns">
          <div class="column">
            <button class="in" _type="Integer"></button>
            <button class="in" _type="Integer"></button>
          </div>
          <div class="column">
            <input style="margin: 1.4px;" placeholder="value">
            <input style="margin: 1.4px;" placeholder="value">
          </div>
          <div class="column">
            <button class="out" _type="Integer"></button>
          </div>
        </div>
    </div>

    <div class="block" block_type="operation_more">
      <div class="top_block">
        <p>Operation ></p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Boolean"></button>
        </div>
      </div>
    </div>

    <div class="block" block_type="operation_less">
      <div class="top_block">
        <p>Operation <</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Boolean"></button>
        </div>
      </div>
    </div>

    <div class="block" block_type="operation_equal">
      <div class="top_block">
        <p>Operation ==</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Boolean"></button>
        </div>
      </div>

    </div>
    
    <div class="block" block_type="operation_not_equal">
      <div class="top_block">
        <p>Operation !=</p>
        <button class="delete-button_x">x</button>
      </div>
      <div class="three_columns">
        <div class="column">
          <button class="in" _type="Integer"></button>
          <button class="in" _type="Integer"></button>
        </div>
        <div class="column">
          <input style="margin: 1.4px;" placeholder="value">
          <input style="margin: 1.4px;" placeholder="value">
        </div>
        <div class="column">
          <button class="out" _type="Boolean"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="safe-zone">
    <svg style="position: absolute; height: 5000px; width: 5000px;"></svg>
    <div class="border"></div>
    <div class="safe-zone-rt"></div>
    <div class="safe-zone-down"></div>
  </div>

  <div class="grid-toggle-wr">
    <button id="grid-toggle-btn" class="grid-toggle-btn">⊞</button>
  </div>

  <script src="scripts/block_scripts.js"></script>
  <!--Размещение блоков-->
  <script src="scripts/placement_of_blocks.js"></script>
  <!--Удаление блоков + закрепление ID и + -->
  <script src="scripts/id_block.js"></script>
  <!--Передвижение (очевидно)-->
  <script src="scripts/movable.js"></script>
  <!--Сетка off_on -->
  <script src="scripts/grid.js"></script>
  <div class="side-button-1-wr">
    <label class="side-button-1" for="side-checkbox">
      <div class="side-b side-open">Ξ</div>
    </label>
  </div>

  <div id="error-console">
    <div style="font-weight: bold; margin-bottom: 8px;">Ошибки</div>
    <div id="error-messages" style="max-height: 150px; overflow-y: auto;"></div>
  </div>
  <div id="output-console">
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
    <span style="font-weight: bold;">Вывод</span>
    <button id="clear-output" style="background: none; border: none; color: #0f0; cursor: pointer; font-size: 14px;">X</button>
    </div>
    <div id="output-messages"></div>
  </div>
</body>
</html>
